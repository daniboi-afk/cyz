<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CYZ — Car Advisor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #f5f0e8; --yellow: #f5c400; --grey: #1c1c1c; --mid: #2e2e2e; --muted: #888; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; overflow-x: hidden; }
    .brand { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 15vw, 10rem); letter-spacing: 0.15em; color: var(--white); line-height: 0.9; text-align: center; }
    .brand span { color: var(--yellow); }
    .tagline { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); text-align: center; margin-top: 0.5rem; margin-bottom: 3rem; }
    .card { background: var(--grey); border: 1px solid var(--mid); border-radius: 4px; padding: 2.5rem; width: 100%; max-width: 480px; }
    .card-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .field { margin-bottom: 1.5rem; }
    input { width: 100%; background: var(--black); border: 1px solid var(--mid); border-radius: 3px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 0.85rem 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--yellow); }
    input::placeholder { color: var(--muted); }
    button { width: 100%; background: var(--yellow); color: var(--black); border: none; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.15em; padding: 1rem; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 0.5rem; }
    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .result { display: none; margin-top: 1.5rem; border-top: 1px solid var(--mid); padding-top: 1.5rem; animation: fadeUp 0.4s ease; }
    .result.visible { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .result-greeting { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .result-car { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.08em; color: var(--yellow); line-height: 1.1; margin-bottom: 0.75rem; }
    .result-message { font-size: 0.95rem; color: var(--white); line-height: 1.6; margin-bottom: 1rem; font-style: italic; border-left: 3px solid var(--yellow); padding-left: 0.8rem; }
    .result-vibe { font-size: 0.85rem; color: var(--yellow); font-weight: 500; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .result-price { display: inline-block; background: var(--mid); border-radius: 2px; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white); padding: 0.3rem 0.7rem; }
    .error-msg { display: none; margin-top: 1rem; font-size: 0.85rem; color: #e05c5c; }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="brand">C<span>Y</span>Z</div>
  <p class="tagline">Car · Income · Advisor</p>
  <div class="card">
    <div class="field">
      <div class="card-label">Your Name</div>
      <input type="text" id="nameInput" placeholder="e.g. Marcus" />
    </div>
    <div class="field">
      <div class="card-label">Annual Income (USD)</div>
      <input type="number" id="incomeInput" placeholder="e.g. 65000" min="0" />
    </div>
    <button id="submitBtn" onclick="getRecommendation()">Find My Car</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result" id="result">
      <div class="result-greeting" id="resultGreeting"></div>
      <div class="result-car"      id="resultCar"></div>
      <div class="result-message"  id="resultMessage"></div>
      <div class="result-vibe"     id="resultVibe"></div>
      <span class="result-price"   id="resultPrice"></span>
    </div>
  </div>
  <script>
    const BACKEND_URL = 'https://cyz.onrender.com/recommend';

    async function getRecommendation() {
      const name    = document.getElementById('nameInput').value.trim();
      const income  = parseFloat(document.getElementById('incomeInput').value);
      const btn     = document.getElementById('submitBtn');
      const errorEl = document.getElementById('errorMsg');
      const resultEl = document.getElementById('result');

      errorEl.classList.remove('visible');
      resultEl.classList.remove('visible');

      if (!name) return showError("Please enter your name.");
      if (isNaN(income) || income < 0) return showError("Please enter a valid income.");

      btn.disabled = true;
      btn.textContent = "Analyzing...";

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, income })
        });
        const data = await response.json();
        if (!response.ok) { showError(data.error || "Something went wrong."); return; }
        showResult(data.name, data);
      } catch (err) {
        showResult(name, localRecommendation(income, name));
      }

      btn.disabled = false;
      btn.textContent = "Find My Car";
    }

    function showResult(name, data) {
      document.getElementById('resultGreeting').textContent = `Hey ${name}, we recommend:`;
      document.getElementById('resultCar').textContent      = data.car;
      document.getElementById('resultMessage').textContent  = data.message;
      document.getElementById('resultVibe').textContent     = `Vibe: ${data.vibe}`;
      document.getElementById('resultPrice').textContent    = data.priceRange;
      document.getElementById('result').classList.add('visible');
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorMsg').classList.add('visible');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = "Find My Car";
    }

    function localRecommendation(income, name) {
      const vips = ['haris', 'naj'];
      if (vips.some(v => name.toLowerCase().includes(v))) return { car: "No car exists", message: "You are too sexy. No car has been made for you yet. Engineers are working on it. They are crying.", priceRange: "Priceless", vibe: "🔥 Too sexy for the automotive industry" };
      if (income < 30000)       return { car: "2008 Toyota Corolla",        message: "Reliable. Honest. Invisible. She will respect you as a person and never text back.", priceRange: "$6,000–$10,000",     vibe: "😐 Friend zoned before you spoke" };
      else if (income < 80000)  return { car: "2022 Hyundai Genesis G70",   message: "She doesn't know the badge but the interior smells like money.", priceRange: "$38,000–$44,000",    vibe: "🔍 She's googling you AND the car" };
      else if (income < 200000) return { car: "2023 Mercedes C-Class",      message: "You pull up in the Benz and she forgets what she was about to say. This is science.", priceRange: "$48,000–$58,000",    vibe: "🌟 She forgot her own name" };
      else if (income < 600000) return { car: "2024 Lamborghini Huracán",   message: "People film you at red lights. She has never felt more famous in her life.", priceRange: "$280,000–$330,000",  vibe: "🎥 Strangers are filming" };
      else                      return { car: "A custom jet with a car inside it", message: "At this income you don't drive to her. She flies to wherever you are.", priceRange: "If you have to ask...", vibe: "🛩️ She flies to YOU" };
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') getRecommendation(); });
  </script>
</body>
</html>
